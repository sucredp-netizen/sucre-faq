<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ana – Assistente Sucré</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f0;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    header {
      background: #1a1a1a;
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #d4a843, #e8c87a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      color: #1a1a1a;
      flex-shrink: 0;
    }

    .header-info h1 { font-size: 16px; font-weight: 600; }
    .header-info p  { font-size: 12px; color: #aaa; margin-top: 2px; }

    .online-dot {
      width: 8px; height: 8px;
      background: #4caf50;
      border-radius: 50%;
      margin-left: auto;
      flex-shrink: 0;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      display: flex;
      gap: 8px;
      max-width: 82%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
    }

    .msg.bot  .bubble { background:#fff; color:#1a1a1a; border-top-left-radius:4px; box-shadow:0 1px 3px rgba(0,0,0,.08); }
    .msg.user .bubble { background:#1a1a1a; color:#fff; border-top-right-radius:4px; }

    .mini-avatar {
      width:28px; height:28px; border-radius:50%;
      background: linear-gradient(135deg,#d4a843,#e8c87a);
      display:flex; align-items:center; justify-content:center;
      font-size:12px; font-weight:bold; color:#1a1a1a;
      flex-shrink:0; margin-top:2px;
    }

    .typing { display:flex; gap:4px; padding:10px 14px; }
    .typing span {
      width:7px; height:7px; border-radius:50%; background:#bbb;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay:.2s; }
    .typing span:nth-child(3) { animation-delay:.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    .quick-replies {
      display:flex; flex-wrap:wrap; gap:8px;
      padding: 0 16px 10px;
    }
    .quick-replies button {
      background:#fff; border:1px solid #ddd; border-radius:20px;
      padding:6px 14px; font-size:13px; cursor:pointer; color:#1a1a1a;
      transition:background .15s,border-color .15s;
    }
    .quick-replies button:hover { background:#1a1a1a; color:#fff; border-color:#1a1a1a; }

    form {
      display:flex; padding:12px 16px; gap:8px;
      background:#fff; border-top:1px solid #e8e8e8;
    }

    #input {
      flex:1; border:1px solid #ddd; border-radius:24px;
      padding:10px 16px; font-size:14px; outline:none;
      resize:none; line-height:1.4; max-height:120px;
      font-family:inherit;
    }
    #input:focus { border-color:#1a1a1a; }

    button[type="submit"] {
      background:#1a1a1a; color:#fff; border:none; border-radius:50%;
      width:42px; height:42px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; align-self:flex-end; transition:background .15s;
    }
    button[type="submit"]:hover    { background:#333; }
    button[type="submit"]:disabled { background:#ccc; cursor:not-allowed; }
    button[type="submit"] svg { width:18px; height:18px; }

    /* tela de configuração */
    #setup-screen {
      position:fixed; inset:0; background:#f5f5f0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:24px; z-index:100;
    }
    #setup-screen .card {
      background:#fff; border-radius:16px;
      padding:32px 28px; max-width:400px; width:100%;
      box-shadow:0 4px 20px rgba(0,0,0,.1);
      text-align:center;
    }
    #setup-screen .logo {
      width:56px; height:56px; border-radius:50%;
      background:linear-gradient(135deg,#d4a843,#e8c87a);
      display:flex; align-items:center; justify-content:center;
      font-size:24px; font-weight:bold; color:#1a1a1a;
      margin:0 auto 16px;
    }
    #setup-screen h2 { font-size:20px; margin-bottom:6px; }
    #setup-screen p  { font-size:13px; color:#666; margin-bottom:20px; line-height:1.5; }
    #setup-screen input {
      width:100%; border:1px solid #ddd; border-radius:10px;
      padding:12px 14px; font-size:14px; outline:none; margin-bottom:12px;
    }
    #setup-screen input:focus { border-color:#1a1a1a; }
    #setup-screen button {
      width:100%; background:#1a1a1a; color:#fff; border:none;
      border-radius:10px; padding:13px; font-size:15px;
      font-weight:600; cursor:pointer;
    }
    #setup-screen .hint {
      font-size:12px; color:#999; margin-top:14px; line-height:1.6;
    }
    #setup-screen .hint a { color:#1a1a1a; }
  </style>
</head>
<body>

<!-- Tela de configuração (aparece só na primeira vez) -->
<div id="setup-screen">
  <div class="card">
    <div class="logo">A</div>
    <h2>Bem-vindo, Ana</h2>
    <p>Para ativar a assistente, insira a chave da API do Google (Gemini). Ela fica salva só no seu navegador.</p>
    <input type="password" id="key-input" placeholder="Cole sua chave aqui..." autocomplete="off" />
    <button onclick="saveKey()">Ativar assistente</button>
    <p class="hint">
      Não tem chave? Acesse <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a>,
      clique em <strong>Create API Key</strong> e cole aqui.<br>É gratuito.
    </p>
  </div>
</div>

<header>
  <div class="avatar">A</div>
  <div class="header-info">
    <h1>Ana</h1>
    <p>Assistente de RH · Sucré Alimentos</p>
  </div>
  <div class="online-dot"></div>
</header>

<div id="chat"></div>

<div class="quick-replies" id="quick-replies">
  <button onclick="sendQuick('Quando recebo meu salário?')">💰 Salário</button>
  <button onclick="sendQuick('Como funciona o vale alimentação?')">🍽️ Vale Alimentação</button>
  <button onclick="sendQuick('Como ajustar o ponto?')">⏱️ Ponto</button>
  <button onclick="sendQuick('Quais licenças tenho direito?')">📋 Licenças</button>
  <button onclick="sendQuick('Como funciona o plano de saúde?')">🏥 Plano de Saúde</button>
  <button onclick="sendQuick('Como solicitar férias?')">🌴 Férias</button>
</div>

<form id="form">
  <textarea id="input" placeholder="Escreva sua dúvida..." rows="1"></textarea>
  <button type="submit" id="send-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</form>

<script>
const SYSTEM_PROMPT = `Você é a Ana, assistente virtual da Sucré Alimentos, especializada em dúvidas de RH e benefícios para colaboradores internos.

Responda sempre em português, de forma amigável, clara e objetiva.
Quando não souber a resposta ou a dúvida for muito específica, oriente o colaborador a contatar o setor de Gente e Gestão pelo e-mail genteegestao@sucre.com.br.

BASE DE CONHECIMENTO – SUCRÉ ALIMENTOS

VALE ALIMENTAÇÃO
- Valor: R$ 20,00 por dia efetivamente trabalhado, 100% custeado pela empresa
- Crédito: até o 5º dia útil de cada mês
- Cartão de propriedade do colaborador (não precisa devolver ao sair)
- Faltas (justificadas ou não) são descontadas na recarga do mês seguinte

VALE TRANSPORTE (Passe Card)
- 2 passagens diárias conforme tarifa vigente
- Desconto em folha: até 6% do salário-base
- Uso exclusivo para deslocamento residência ↔ trabalho

TRANSPORTE – METRÔ
- Empresa paga o valor do metrô mediante comprovação e assinatura de termo

MOBILIDADE (Reembolso de KM)
- Antecipação e reembolso de KM conforme política interna

AUXÍLIO COMBUSTÍVEL
- R$ 250,00/mês: quem NÃO mora em Maracanaú, distância > 8 km
- R$ 150,00/mês: quem mora em Maracanaú, distância > 8 km

PLANO DE SAÚDE
- Operadoras: Unimed – Essencial Max ou Hapvida – Nosso Plano
- Empresa custeia 50% para o colaborador
- Inclusão de dependentes (filhos/cônjuge): colaborador paga 100% do adicional
- Disponível após 90 dias de vínculo

PLANO ODONTOLÓGICO
- Operadoras: Clin e Odontoart
- Empresa custeia 50% para o colaborador
- Inclusão de dependentes permitida (colaborador paga 100% do adicional)

DESCONTO EM PRODUTOS SUCRÉ
- 20% de desconto
- Desconto em folha após 90 dias (limite R$ 200,00/mês; R$ 100,00 para quem tem consignado)
- Pedidos: WhatsApp (85) 99862-0284, seg/ter/sex das 8h30 às 16h30
- Retirada: quinta-feira até 16h no estoque/logística

SALÁRIO E PAGAMENTOS
- Adiantamento: 40% no dia 20 de cada mês (quando dia útil)
- Fechamento: 60% restantes até o 5º dia útil do mês seguinte
- Pagamento via Banco do Brasil (conta salário)

FÉRIAS
- Concedidas conforme conveniência da empresa, respeitando a CLT
- Podem ser fracionadas em até 3 períodos
- Impacto de faltas não justificadas: até 5 faltas = 30 dias | 6-14 = 24 dias | 15-23 = 18 dias | 24-32 = 12 dias

LICENÇAS
- Falecimento (pai, mãe, irmão, cônjuge, avós): 2 dias consecutivos
- Casamento civil: 3 dias consecutivos
- Paternidade estendida: 20 dias
- Maternidade estendida: 180 dias
- Demais casos: consultar Art. 473 da CLT

PONTO ELETRÔNICO
- Registrar ponto: no intervalo, no retorno e no término da jornada
- Ajuste de ponto: comunicar ao gestor e ao DP, solicitar correção no sistema
- Tolerância: até 10 minutos
- Atestados: enviar foto ao DP e gestor em até 48h; original só quando solicitado
- Declaração médica: abona 4 horas (restante da jornada = falta parcial)
- Banco de horas: compensação em até 2 meses; horas não compensadas viram horas extras pagas
- Horas extras: somente com autorização prévia do gestor; proibido durante intervalo

CONTATO GENTE E GESTÃO
- E-mail: genteegestao@sucre.com.br
- Ouvidoria (confidencial): https://app.feedz.com.br/ouvidoria

Responda somente sobre os temas acima. Para outros assuntos, oriente a contactar genteegestao@sucre.com.br.`;

  const setupScreen = document.getElementById('setup-screen');
  const chat        = document.getElementById('chat');
  const form        = document.getElementById('form');
  const input       = document.getElementById('input');
  const sendBtn     = document.getElementById('send-btn');
  const quickReplies= document.getElementById('quick-replies');

  let history = [];

  // Verifica se já tem chave salva
  const savedKey = localStorage.getItem('gemini_key');
  if (savedKey) setupScreen.style.display = 'none';

  function saveKey() {
    const key = document.getElementById('key-input').value.trim();
    if (!key) { alert('Cole a chave antes de continuar.'); return; }
    localStorage.setItem('gemini_key', key);
    setupScreen.style.display = 'none';
    showWelcome();
  }

  function showWelcome() {
    setTimeout(() => {
      addMessage('bot', 'Olá! Sou a Ana, sua assistente de RH da Sucré. 😊\n\nEstou aqui para ajudar com dúvidas sobre benefícios, ponto eletrônico, férias, licenças e pagamentos.\n\nComo posso te ajudar hoje?');
    }, 300);
  }

  if (savedKey) showWelcome();

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    if (role === 'bot') {
      div.innerHTML = `<div class="mini-avatar">A</div><div class="bubble">${escapeHtml(text)}</div>`;
    } else {
      div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
    }
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg bot'; div.id = 'typing';
    div.innerHTML = `<div class="mini-avatar">A</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  async function sendMessage(text) {
    if (!text.trim()) return;
    const key = localStorage.getItem('gemini_key');
    if (!key) { setupScreen.style.display = 'flex'; return; }

    quickReplies.style.display = 'none';
    addMessage('user', text);
    history.push({ role: 'user', parts: [{ text }] });

    input.value = ''; input.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();

    const body = {
      system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
      contents: history,
      generationConfig: { maxOutputTokens: 1024, temperature: 0.4 }
    };

    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,
        { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
      );
      const data = await res.json();
      removeTyping();

      if (!res.ok) {
        const err = data.error?.message || 'Erro desconhecido';
        if (err.includes('API_KEY')) {
          localStorage.removeItem('gemini_key');
          addMessage('bot', 'Chave de API inválida. Recarregue a página e insira uma chave válida.');
        } else {
          addMessage('bot', `Erro: ${err}`);
        }
        sendBtn.disabled = false; return;
      }

      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Não consegui processar. Tente novamente.';
      addMessage('bot', reply);
      history.push({ role: 'model', parts: [{ text: reply }] });
    } catch {
      removeTyping();
      addMessage('bot', 'Não consegui me conectar. Verifique sua conexão e tente novamente.');
    }

    sendBtn.disabled = false;
    input.focus();
  }

  function sendQuick(text) { sendMessage(text); }

  form.addEventListener('submit', e => { e.preventDefault(); sendMessage(input.value); });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(input.value); }
  });

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
