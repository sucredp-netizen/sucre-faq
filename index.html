  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #FA2458;
      --yellow: #FED278;
      --white:  #ffffff;
      --dark:   #1a1a1a;
      --gray:   #f4f4f4;
      --border: #e8e8e8;
      --text:   #333333;
      --muted:  #888888;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--white);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      color: var(--text);
    }

    /* ── TELA DE LOGIN ── */
    #login-screen {
      position: fixed; inset: 0;
      background: var(--white);
      display: flex; align-items: center; justify-content: center;
      padding: 24px; z-index: 200;
    }

    .login-card {
      background: var(--white);
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 380px; width: 100%;
      box-shadow: 0 8px 40px rgba(250,36,88,.12);
      text-align: center;
    }

    .login-logo {
      height: 64px;
      margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center;
    }

    .login-logo img {
      max-height: 64px; max-width: 200px;
      object-fit: contain;
    }

    .login-logo-fallback {
      font-size: 28px; font-weight: 800;
      background: linear-gradient(135deg, var(--red), var(--yellow));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    .login-card h2 {
      font-size: 20px; font-weight: 700; margin-bottom: 6px; color: var(--dark);
    }

    .login-card p {
      font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.5;
    }

    .login-card input {
      width: 100%;
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      text-align: center;
      letter-spacing: 3px;
      outline: none;
      transition: border-color .2s;
      color: var(--dark);
    }
    .login-card input:focus { border-color: var(--red); }

    .login-card input.error { border-color: var(--red); animation: shake .3s; }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
    }

    .login-error {
      font-size: 13px; color: var(--red); margin-top: 8px;
      min-height: 18px; font-weight: 500;
    }

    .login-btn {
      width: 100%; margin-top: 16px;
      background: var(--red); color: var(--white); border: none;
      border-radius: 12px; padding: 14px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .login-btn:hover  { opacity: .9; }
    .login-btn:active { transform: scale(.98); }

    .login-btn:disabled { background: #ccc; cursor: not-allowed; }

    /* ── SETUP DE ADMIN (chave API) ── */
    #setup-screen {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center;
      padding: 24px; z-index: 300;
    }

    .setup-card {
      background: var(--white); border-radius: 16px;
      padding: 32px 28px; max-width: 400px; width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,.2);
    }

    .setup-card h3 { font-size: 17px; margin-bottom: 8px; color: var(--dark); }
    .setup-card p  { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
    .setup-card p a { color: var(--red); }

    .setup-card input {
      width: 100%; border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px; font-size: 14px; outline: none; margin-bottom: 12px;
    }
    .setup-card input:focus { border-color: var(--red); }

    .setup-btn {
      width: 100%; background: var(--dark); color: var(--white); border: none;
      border-radius: 10px; padding: 13px;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }

    /* ── HEADER ── */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex; align-items: center; gap: 12px;
    }

    .header-logo {
      height: 36px;
      display: flex; align-items: center;
    }
    .header-logo img {
      max-height: 36px; max-width: 120px; object-fit: contain;
    }
    .header-logo-fallback {
      font-size: 18px; font-weight: 800;
      background: linear-gradient(135deg, var(--red), var(--yellow));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .header-divider {
      width: 1px; height: 28px; background: var(--border); flex-shrink: 0;
    }

    .bot-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--red), var(--yellow));
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 800; color: var(--white); flex-shrink: 0;
    }

    .header-info { flex: 1; }
    .header-info h1 { font-size: 15px; font-weight: 700; color: var(--dark); }
    .header-info p  { font-size: 12px; color: var(--muted); margin-top: 1px; }

    .online-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: #22c55e; font-weight: 500;
    }
    .online-badge::before {
      content: ''; width: 7px; height: 7px;
      background: #22c55e; border-radius: 50%;
    }

    /* ── CHAT ── */
    #chat {
      flex: 1; overflow-y: auto;
      padding: 20px 16px;
      display: flex; flex-direction: column; gap: 14px;
      background: var(--white);
    }

    .msg {
      display: flex; gap: 8px;
      max-width: 80%;
      animation: fadeUp .2s ease;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
    }

    .msg.bot  .bubble {
      background: var(--gray);
      color: var(--dark);
      border-top-left-radius: 4px;
    }

    .msg.user .bubble {
      background: var(--red);
      color: var(--white);
      border-top-right-radius: 4px;
    }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; margin-top: 2px;
      background: linear-gradient(135deg, var(--red), var(--yellow));
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: var(--white);
    }

    /* typing */
    .typing-dots { display:flex; gap:5px; padding: 12px 16px; }
    .typing-dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #ccc; animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2){animation-delay:.2s}
    .typing-dots span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}

    /* ── QUICK REPLIES ── */
    .quick-wrap {
      padding: 0 16px 10px;
      display: flex; flex-wrap: wrap; gap: 8px;
    }

    .quick-btn {
      border: 1.5px solid var(--border);
      background: var(--white); color: var(--dark);
      border-radius: 20px; padding: 7px 15px;
      font-size: 13px; cursor: pointer;
      transition: all .15s;
    }
    .quick-btn:hover {
      border-color: var(--red); color: var(--red);
      background: rgba(250,36,88,.05);
    }

    /* ── INPUT ── */
    form {
      display: flex; gap: 8px; padding: 12px 16px;
      background: var(--white); border-top: 1px solid var(--border);
    }

    #input {
      flex: 1; border: 1.5px solid var(--border); border-radius: 24px;
      padding: 10px 16px; font-size: 14px; outline: none;
      resize: none; max-height: 120px; line-height: 1.4;
      font-family: inherit; transition: border-color .2s;
    }
    #input:focus { border-color: var(--red); }

    #send-btn {
      background: var(--red); color: var(--white); border: none;
      border-radius: 50%; width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; align-self: flex-end;
      transition: opacity .15s;
    }
    #send-btn:hover    { opacity: .85; }
    #send-btn:disabled { background: #ccc; cursor: not-allowed; }
    #send-btn svg { width: 17px; height: 17px; }

    /* ── USER CHIP (canto) ── */
    .user-chip {
      position: absolute; top: 12px; right: 16px;
      font-size: 12px; color: var(--muted);
    }

    header { position: relative; }
  </style>
</head>

  // Aceita tanto "14" quanto "PJ14"
  const chave = COLABORADORES[raw] ? raw : (COLABORADORES['PJ' + raw] ? 'PJ' + raw : null);
  const nome  = chave ? COLABORADORES[chave] : null;

  if (!nome) {
    errEl.textContent = 'Matrícula não encontrada. Verifique e tente novamente.';
    inpEl.classList.add('error');
    setTimeout(() => inpEl.classList.remove('error'), 600);
    return;
  }

  currentUser = { matricula: chave, nome };
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('header-sub').textContent = `Assistente de RH · Matrícula ${chave}`;
  sendBtn.disabled = false;

  const primeiroNome = nome.split(' ')[0];
  primeiroNome_capitalizado = primeiroNome.charAt(0) + primeiroNome.slice(1).toLowerCase();

  addBotMsg(`Olá, ${primeiroNome_capitalizado}! 😊\n\nSou a Ana, sua assistente de RH da Sucré. Estou aqui para ajudar com dúvidas sobre benefícios, ponto, férias, licenças e pagamentos.\n\nComo posso te ajudar hoje?`);
}

// ── MENSAGENS ─────────────────────────────────────────────────────────────
function addBotMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `<div class="msg-avatar">A</div><div class="bubble">${esc(text)}</div>`;
  chat.appendChild(div);
  scroll();
}

function addUserMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="bubble">${esc(text)}</div>`;
  chat.appendChild(div);
  scroll();
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">A</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(div); scroll();
}
function removeTyping() { document.getElementById('typing')?.remove(); }

function scroll() { chat.scrollTop = chat.scrollHeight; }

function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ── ENVIO ─────────────────────────────────────────────────────────────────
async function sendMessage(text) {
  if (!text.trim() || !currentUser) return;

  const key = localStorage.getItem('_gak');
  if (!key) { document.getElementById('setup-screen').style.display = 'flex'; return; }

  quickWrap.style.display = 'none';
  addUserMsg(text);
  history.push({ role: 'user', parts: [{ text }] });

  inputEl.value = ''; inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  showTyping();

  const body = {
    system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
    contents: history,
    generationConfig: { maxOutputTokens: 1024, temperature: 0.4 }
  };

  try {
    const res  = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,
      { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) }
    );
    const data = await res.json();
    removeTyping();

    if (!res.ok) {
      const msg = data.error?.message || '';
      if (msg.includes('API_KEY') || msg.includes('key')) {
        localStorage.removeItem('_gak');
        addBotMsg('Chave de API expirada ou inválida. Fale com o administrador para atualizar a chave.');
      } else {
        addBotMsg(`Ocorreu um erro: ${msg || 'tente novamente.'}`);
      }
      sendBtn.disabled = false; return;
    }

    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text
                  || 'Não consegui processar. Por favor, tente novamente.';
    addBotMsg(reply);
    history.push({ role:'model', parts:[{ text: reply }] });
  } catch {
    removeTyping();
    addBotMsg('Não consegui me conectar. Verifique sua conexão e tente novamente.');
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

function sendQuick(t) { sendMessage(t); }

form.addEventListener('submit', e => { e.preventDefault(); sendMessage(inputEl.value); });

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(inputEl.value); }
});

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});
</script>
