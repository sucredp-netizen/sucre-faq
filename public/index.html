<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ana – Assistente Sucré</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #FA2458;
      --yellow: #FED278;
      --white:  #ffffff;
      --dark:   #1a1a1a;
      --gray:   #f4f4f4;
      --border: #e8e8e8;
      --text:   #333333;
      --muted:  #888888;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--white);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      color: var(--text);
    }

    /* ── TELA DE LOGIN ── */
    #login-screen {
      position: fixed; inset: 0;
      background: var(--white);
      display: flex; align-items: center; justify-content: center;
      padding: 24px; z-index: 200;
    }

    .login-card {
      background: var(--white);
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 380px; width: 100%;
      box-shadow: 0 8px 40px rgba(250,36,88,.12);
      text-align: center;
    }

    .login-logo {
      height: 64px;
      margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center;
    }

    .login-logo img {
      max-height: 64px; max-width: 200px;
      object-fit: contain;
    }

    .login-logo-fallback {
      font-size: 28px; font-weight: 800;
      background: linear-gradient(135deg, var(--red), var(--yellow));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    .login-card h2 {
      font-size: 20px; font-weight: 700; margin-bottom: 6px; color: var(--dark);
    }

    .login-card p {
      font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.5;
    }

    .login-card input {
      width: 100%;
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      text-align: center;
      letter-spacing: 3px;
      outline: none;
      transition: border-color .2s;
      color: var(--dark);
    }
    .login-card input:focus { border-color: var(--red); }

    .login-card input.error { border-color: var(--red); animation: shake .3s; }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
    }

    .login-error {
      font-size: 13px; color: var(--red); margin-top: 8px;
      min-height: 18px; font-weight: 500;
    }

    .login-btn {
      width: 100%; margin-top: 16px;
      background: var(--red); color: var(--white); border: none;
      border-radius: 12px; padding: 14px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .login-btn:hover  { opacity: .9; }
    .login-btn:active { transform: scale(.98); }

    .login-btn:disabled { background: #ccc; cursor: not-allowed; }

    /* ── SETUP DE ADMIN (chave API) ── */
    #setup-screen {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center;
      padding: 24px; z-index: 300;
    }

    .setup-card {
      background: var(--white); border-radius: 16px;
      padding: 32px 28px; max-width: 400px; width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,.2);
    }

    .setup-card h3 { font-size: 17px; margin-bottom: 8px; color: var(--dark); }
    .setup-card p  { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
    .setup-card p a { color: var(--red); }

    .setup-card input {
      width: 100%; border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px; font-size: 14px; outline: none; margin-bottom: 12px;
    }
    .setup-card input:focus { border-color: var(--red); }

    .setup-btn {
      width: 100%; background: var(--dark); color: var(--white); border: none;
      border-radius: 10px; padding: 13px;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }

    /* ── HEADER ── */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex; align-items: center; gap: 12px;
    }

    .header-logo {
      height: 36px;
      display: flex; align-items: center;
    }
    .header-logo img {
      max-height: 36px; max-width: 120px; object-fit: contain;
    }
    .header-logo-fallback {
      font-size: 18px; font-weight: 800;
      background: linear-gradient(135deg, var(--red), var(--yellow));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .header-divider {
      width: 1px; height: 28px; background: var(--border); flex-shrink: 0;
    }

    .bot-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--red), var(--yellow));
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 800; color: var(--white); flex-shrink: 0;
    }

    .header-info { flex: 1; }
    .header-info h1 { font-size: 15px; font-weight: 700; color: var(--dark); }
    .header-info p  { font-size: 12px; color: var(--muted); margin-top: 1px; }

    .online-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: #22c55e; font-weight: 500;
    }
    .online-badge::before {
      content: ''; width: 7px; height: 7px;
      background: #22c55e; border-radius: 50%;
    }

    /* ── CHAT ── */
    #chat {
      flex: 1; overflow-y: auto;
      padding: 20px 16px;
      display: flex; flex-direction: column; gap: 14px;
      background: var(--white);
    }

    .msg {
      display: flex; gap: 8px;
      max-width: 80%;
      animation: fadeUp .2s ease;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
    }

    .msg.bot  .bubble {
      background: var(--gray);
      color: var(--dark);
      border-top-left-radius: 4px;
    }

    .msg.user .bubble {
      background: var(--red);
      color: var(--white);
      border-top-right-radius: 4px;
    }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; margin-top: 2px;
      background: linear-gradient(135deg, var(--red), var(--yellow));
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: var(--white);
    }

    /* typing */
    .typing-dots { display:flex; gap:5px; padding: 12px 16px; }
    .typing-dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #ccc; animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2){animation-delay:.2s}
    .typing-dots span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}

    /* ── QUICK REPLIES ── */
    .quick-wrap {
      padding: 0 16px 10px;
      display: flex; flex-wrap: wrap; gap: 8px;
    }

    .quick-btn {
      border: 1.5px solid var(--border);
      background: var(--white); color: var(--dark);
      border-radius: 20px; padding: 7px 15px;
      font-size: 13px; cursor: pointer;
      transition: all .15s;
    }
    .quick-btn:hover {
      border-color: var(--red); color: var(--red);
      background: rgba(250,36,88,.05);
    }

    /* ── INPUT ── */
    form {
      display: flex; gap: 8px; padding: 12px 16px;
      background: var(--white); border-top: 1px solid var(--border);
    }

    #input {
      flex: 1; border: 1.5px solid var(--border); border-radius: 24px;
      padding: 10px 16px; font-size: 14px; outline: none;
      resize: none; max-height: 120px; line-height: 1.4;
      font-family: inherit; transition: border-color .2s;
    }
    #input:focus { border-color: var(--red); }

    #send-btn {
      background: var(--red); color: var(--white); border: none;
      border-radius: 50%; width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; align-self: flex-end;
      transition: opacity .15s;
    }
    #send-btn:hover    { opacity: .85; }
    #send-btn:disabled { background: #ccc; cursor: not-allowed; }
    #send-btn svg { width: 17px; height: 17px; }

    /* ── USER CHIP (canto) ── */
    .user-chip {
      position: absolute; top: 12px; right: 16px;
      font-size: 12px; color: var(--muted);
    }

    header { position: relative; }
  </style>
</head>

const SYSTEM_PROMPT = `Você é a Ana, assistente virtual de RH da Sucré Alimentos.
Responda em português, de forma amigável, clara e objetiva.
SOMENTE envie o link do Departamento Pessoal nas seguintes situações:

BASE DE CONHECIMENTO – FAQ SUCRÉ ALIMENTOS

1. VALE TRANSPORTE
P: O vale transporte é obrigatório? Como faço para aderir?
R: A adesão ao VT é opcional. Quem não optou na admissão não recebe automaticamente. Para aderir, assinar o termo de opção ao VT junto ao DP. O cartão chega em cerca de 4 dias úteis.
P: Qual o desconto do vale transporte?
R: O desconto é de até 6% do salário-base, conforme a Lei nr 7.418/1985.
P: Posso cancelar ou mudar minha opção de VT a qualquer momento?
R: Não. Existem datas de corte — não é possível alterar no meio do mês.

2. VALE ALIMENTAÇÃO
P: Por que recebi menos no vale alimentação este mês?
R: O VA é pago por dia efetivamente trabalhado (mínimo 6h). Faltas, feriados e atestados reduzem o valor. Cálculo: dias úteis trabalhados x R$20,00.
P: Quando o vale alimentação é creditado?
R: Até o 5º dia útil de cada mês.
P: Se eu sair da empresa, preciso devolver o cartão?
R: Não. O cartão é de propriedade do colaborador.

3. SALÁRIO E PAGAMENTOS
P: Quando cai o salário?
R: Adiantamento (40%) no dia 20 de cada mês (quando dia útil). O restante (60%) até o 5º dia útil do mês seguinte. Pagamento via Banco do Brasil (conta salário).
P: Não encontrei meu pagamento na conta — o que faço?
R: Verifique o extrato no app do Banco do Brasil e confira agência e conta. Se não localizar, contate o DP com: nome, CPF, banco, agência, conta e print do extrato.
P: O décimo terceiro é pago de uma vez só?
R: Não. Primeira parcela (50%) em novembro, segunda em dezembro (com desconto do INSS).
P: Como é calculado o adicional noturno?
R: Hora normal = Salário dividido por 220. Adicional noturno (20%) = Hora normal x 0,20. Total = Adicional x horas noturnas do mês.

4. PONTO ELETRÔNICO
P: Como ajustar uma batida de ponto errada ou esquecida?
R: No app: Meu RH > Meu Ponto > clique no dia > Ajuste. Para adicionar batida antes das demais, use "Adicionar ponto antes" (botão verde). Ajustes só podem ser feitos no dia seguinte ou depois.
P: Qual é o login e senha do app de ponto?
R: Login: CPF sem pontos ou traços. Senha padrão inicial: @Sucre123
P: O app de ponto não está funcionando — o que faço?
R: Desinstale e instale novamente, ou limpe o cache. Se persistir, solicite o ajuste no dia seguinte.
P: O ponto está mostrando horas negativas — o que significa?
R: O colaborador está devendo horas a compensar: até 1h por dia e no máximo 4h por semana.

5. ATESTADO MÉDICO
P: Como lanço um atestado no aplicativo?
R: Meu RH > Meu Espelho Ponto > clique no dia > Abono > tipo "Atestado". Informe médico, CRM, local, período e anexe a foto. Para múltiplos dias: use "Abonar intervalo de dias".
P: O CID é obrigatório no atestado?
R: Não. Atestados sem CID são aceitos normalmente.
P: O atestado cobre o dia todo?
R: Sim, abona o dia inteiro (ou os dias indicados pelo médico).
P: Preciso entregar o atestado original no DP?
R: A versão digital no app é válida. O original só se solicitado.

6. DECLARAÇÃO DE COMPARECIMENTO
P: Qual a diferença entre atestado e declaração médica?
R: Atestado abona o dia inteiro. Declaração abona apenas até 4 horas.
P: Como lanço uma declaração de consulta no ponto?
R: Meu RH > Meu Ponto > clique no dia > Abono > tipo "Ausência Justificada". Informe o período e anexe o documento.
P: Consulta de pré-natal abona o dia todo?
R: Sim. Pré-natal abona o dia inteiro, não apenas as horas.
P: Fiz o ASO Periódico solicitado pela empresa — as horas são abonadas?
R: Sim. As horas do ASO Periódico são abonadas integralmente.

7. BANCO DE HORAS
P: Como funciona o banco de horas?
R: Horas extras geram banco positivo. Horas não trabalhadas sem justificativa geram banco negativo. Compensação em até 2 meses; se não compensadas, são pagas como horas extras com adicional legal.
P: Como compensar horas negativas?
R: Trabalhando até 1h extra por dia e no máximo 4h por semana.
P: Posso usar horas positivas para sair mais cedo?
R: Sim, combinando previamente com o gestor direto.
P: Trabalhei em feriado — as horas vão para o banco?
R: Não. Feriado trabalhado é pago em dobro (100% a mais), não compensado em banco.

8. FÉRIAS
P: Quando saberei minhas férias?
R: A programação é feita em dezembro para o ano seguinte. As datas podem ser alteradas.
P: Quando recebo o pagamento das férias?
R: Até 48 horas antes do início (sábados contam como dia útil).
P: Posso fracionar as férias?
R: Sim, em até 3 períodos.
P: Quantos dias de férias com faltas?
R: Até 5 faltas → 30 dias | 6 a 14 → 24 dias | 15 a 23 → 18 dias | 24 a 32 → 12 dias.

9. LICENÇAS
P: Nasceu meu filho — quantos dias tenho de licença?
R: Licença paternidade estendida: 20 dias corridos. Enviar comprovante de nascimento ao DP e depois a Certidão de Nascimento.
P: Quantos dias para falecimento na família?
R: 2 dias corridos (cônjuge, pais, filhos, irmãos ou pessoa declarada na carteira).
P: Quantos dias para casamento?
R: 3 dias corridos para casamento civil.
P: Qual a duração da licença maternidade?
R: 180 dias (licença maternidade estendida).

10. PLANO DE SAÚDE
P: Quando posso aderir ao plano de saúde?
R: Solicitar ao DP até o dia 10 de cada mês. Vigência começa no mês seguinte. Disponível após 90 dias de vínculo.
P: Quanto custa o plano para o colaborador?
R: A empresa custeia 50% do plano titular (Unimed Essencial Max). O valor varia conforme a idade.
P: Posso incluir filhos e cônjuge no plano?
R: Sim. O colaborador paga 100% do valor adicional. Documentos: RG, CPF, Certidão de Nascimento (filhos), Declaração Escolar.
P: Como usar o plano para urgência e emergência?
R: Não precisa marcar consulta. Procure a clínica credenciada mais próxima. App: "Minha Unimed" (laranja) ou "Cliente Unimed Fortaleza" (verde).
P: Se cancelar o plano, posso reativar quando quiser?
R: Não. Precisa esperar 3 meses para reativar. Para cancelar: assinar ficha de exclusão no DP.

11. SALÁRIO FAMÍLIA
P: Tenho filhos — tenho direito ao salário família?
R: Sim. Envie ao DP: Certidão de Nascimento, CPF, Carteira de Vacinação e Declaração Escolar. Benefício entra na próxima folha após o cadastro.

12. CONTRACHEQUE / HOLERITE
P: Como acesso meu contracheque?
R: Pelo aplicativo Caju. Em caso de dificuldade, o DP pode enviar pelo WhatsApp.
P: Não consigo acessar o Caju — o que faço?
R: Suporte Caju: WhatsApp (11) 4118-3826 ou oi@caju.com.br. Ou solicite ao DP para atualizar seus dados.

13. ASO / EXAME OCUPACIONAL
P: Onde realizo o exame admissional/demissional/periódico?
R: Clínica Quality — Rod. Dr. Mendel Steinbruch, 10293, sala 3335 (Patio Pajucara), Maracanaú. Horário: a partir das 07h, por ordem de chegada (apenas pela manhã). Levar documento com foto e guia emitida pelo DP.
P: Preciso fazer exame antes de retornar de afastamento?
R: Sim. Obter atestado médico de aptidão, o DP solicita guia do ASO de retorno, e só retorna após resultado favorável.

14. AFASTAMENTO / INSS
P: Precisei me afastar por cirurgia — como funciona com o INSS?
R: A empresa prepara o requerimento e o DP envia o PDF por WhatsApp. O colaborador leva ao INSS para dar entrada. Durante o afastamento, a remuneração é responsabilidade do INSS.

15. CONTRIBUIÇÃO SINDICAL
P: O que é o desconto de "Contribuição Sindical Laboral"?
R: Contribuição ao Sindipan de Maracanaú (Convenção Coletiva, assistência jurídica, eventos). Valor: equivalente a um dia de salário.
P: Sou obrigado a pagar?
R: Não. Quem não quiser pagar assina o termo de oposição. O DP envia por e-mail para assinatura digital.

16. ATUALIZAÇÃO CADASTRAL
P: Como atualizo meu endereço na empresa?
R: Enviar comprovante de residência no nome do colaborador (agua, energia ou internet). A contabilidade atualiza no e-Social e o colaborador assina ficha eletrônica. Sem comprovante no próprio nome, não é possível atualizar.

17. CRACHÁ
P: Meu crachá está danificado — como solicito um novo?
R: Solicitar ao DP. Custo aproximado de R$8,00. Necessário fornecer uma foto.

18. CONTRATO DE EXPERIÊNCIA
P: Quanto tempo dura o contrato de experiência?
R: 45 dias, podendo ser prorrogado por mais 45 (máximo 90 dias). Ao final, avaliação para decisão de efetivação.

// ── ESTADO ───────────────────────────────────────────────────────────────
const chat       = document.getElementById('chat');
const form       = document.getElementById('form');
const inputEl    = document.getElementById('input');
const sendBtn    = document.getElementById('send-btn');
const quickWrap  = document.getElementById('quick-wrap');

let history      = [];
let currentUser  = null;

// ── LOGIN POR MATRÍCULA ───────────────────────────────────────────────────
function doLogin() {
  const raw = document.getElementById('matricula-input').value.trim().toUpperCase();
  const errEl = document.getElementById('login-error');
  const inpEl = document.getElementById('matricula-input');

  if (!raw) { errEl.textContent = 'Digite sua matrícula.'; inpEl.classList.add('error'); return; }

  // Aceita tanto "14" quanto "PJ14"
  const chave = COLABORADORES[raw] ? raw : (COLABORADORES['PJ' + raw] ? 'PJ' + raw : null);
  const nome  = chave ? COLABORADORES[chave] : null;

  if (!nome) {
    errEl.textContent = 'Matrícula não encontrada. Verifique e tente novamente.';
    inpEl.classList.add('error');
    setTimeout(() => inpEl.classList.remove('error'), 600);
    return;
  }

  currentUser = { matricula: chave, nome };
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('header-sub').textContent = `Assistente de RH · Matrícula ${chave}`;
  sendBtn.disabled = false;

  const primeiroNome = nome.split(' ')[0];
  primeiroNome_capitalizado = primeiroNome.charAt(0) + primeiroNome.slice(1).toLowerCase();

  addBotMsg(`Olá, ${primeiroNome_capitalizado}! 😊\n\nSou a Ana, sua assistente de RH da Sucré. Estou aqui para ajudar com dúvidas sobre benefícios, ponto, férias, licenças e pagamentos.\n\nComo posso te ajudar hoje?`);
}

// ── MENSAGENS ─────────────────────────────────────────────────────────────
function addBotMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `<div class="msg-avatar">A</div><div class="bubble">${esc(text)}</div>`;
  chat.appendChild(div);
  scroll();
}

function addUserMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="bubble">${esc(text)}</div>`;
  chat.appendChild(div);
  scroll();
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">A</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(div); scroll();
}
function removeTyping() { document.getElementById('typing')?.remove(); }

function scroll() { chat.scrollTop = chat.scrollHeight; }

function esc(t) {
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>')
    .replace(/(https?:\/\/[^\s<&]+)/g,'<a href="$1" target="_blank" style="color:var(--red);word-break:break-all;">Clique aqui para falar com o Departamento Pessoal</a>');
}

// ── ENVIO ─────────────────────────────────────────────────────────────────
async function sendMessage(text) {
  if (!text.trim() || !currentUser) return;

  quickWrap.style.display = 'none';
  addUserMsg(text);
  history.push({ role: 'user', content: text });

  inputEl.value = ''; inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...history]
      })
    });
    const data = await res.json();
    removeTyping();

    if (!res.ok) {
      addBotMsg('Ocorreu um erro. Tente novamente.');
      sendBtn.disabled = false; return;
    }

    const reply = data.choices?.[0]?.message?.content || 'Não consegui processar. Por favor, tente novamente.';
    addBotMsg(reply);
    history.push({ role: 'assistant', content: reply });
  } catch {
    removeTyping();
    addBotMsg('Não consegui me conectar. Verifique sua conexão e tente novamente.');
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

function sendQuick(t) { sendMessage(t); }

form.addEventListener('submit', e => { e.preventDefault(); sendMessage(inputEl.value); });

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(inputEl.value); }
});

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
