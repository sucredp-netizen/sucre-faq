<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ana – Assistente Sucré</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #FA2458;
      --yellow: #FED278;
      --white:  #ffffff;
      --dark:   #1a1a1a;
      --gray:   #f4f4f4;
      --border: #e8e8e8;
      --text:   #333333;
      --muted:  #888888;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--white);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      color: var(--text);
    }

    /* ── TELA DE LOGIN ── */
    #login-screen {
      position: fixed; inset: 0;
      background: var(--white);
      display: flex; align-items: center; justify-content: center;
      padding: 24px; z-index: 200;
    }

    .login-card {
      background: var(--white);
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 380px; width: 100%;
      box-shadow: 0 8px 40px rgba(250,36,88,.12);
      text-align: center;
    }

    .login-logo {
      height: 64px;
      margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center;
    }

    .login-logo img {
      max-height: 64px; max-width: 200px;
      object-fit: contain;
    }

    .login-logo-fallback {
      font-size: 28px; font-weight: 800;
      background: linear-gradient(135deg, var(--red), var(--yellow));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    .login-card h2 {
      font-size: 20px; font-weight: 700; margin-bottom: 6px; color: var(--dark);
    }

    .login-card p {
      font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.5;
    }

    .login-card input {
      width: 100%;
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      text-align: center;
      letter-spacing: 3px;
      outline: none;
      transition: border-color .2s;
      color: var(--dark);
    }
    .login-card input:focus { border-color: var(--red); }

    .login-card input.error { border-color: var(--red); animation: shake .3s; }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
    }

    .login-error {
      font-size: 13px; color: var(--red); margin-top: 8px;
      min-height: 18px; font-weight: 500;
    }

    .login-btn {
      width: 100%; margin-top: 16px;
      background: var(--red); color: var(--white); border: none;
      border-radius: 12px; padding: 14px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .login-btn:hover  { opacity: .9; }
    .login-btn:active { transform: scale(.98); }

    .login-btn:disabled { background: #ccc; cursor: not-allowed; }

    /* ── SETUP DE ADMIN (chave API) ── */
    #setup-screen {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center;
      padding: 24px; z-index: 300;
    }

    .setup-card {
      background: var(--white); border-radius: 16px;
      padding: 32px 28px; max-width: 400px; width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,.2);
    }

    .setup-card h3 { font-size: 17px; margin-bottom: 8px; color: var(--dark); }
    .setup-card p  { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
    .setup-card p a { color: var(--red); }

    .setup-card input {
      width: 100%; border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px; font-size: 14px; outline: none; margin-bottom: 12px;
    }
    .setup-card input:focus { border-color: var(--red); }

    .setup-btn {
      width: 100%; background: var(--dark); color: var(--white); border: none;
      border-radius: 10px; padding: 13px;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }

    /* ── HEADER ── */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex; align-items: center; gap: 12px;
    }

    .header-logo {
      height: 36px;
      display: flex; align-items: center;
    }
    .header-logo img {
      max-height: 36px; max-width: 120px; object-fit: contain;
    }
    .header-logo-fallback {
      font-size: 18px; font-weight: 800;
      background: linear-gradient(135deg, var(--red), var(--yellow));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .header-divider {
      width: 1px; height: 28px; background: var(--border); flex-shrink: 0;
    }

    .bot-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--red), var(--yellow));
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 800; color: var(--white); flex-shrink: 0;
    }

    .header-info { flex: 1; }
    .header-info h1 { font-size: 15px; font-weight: 700; color: var(--dark); }
    .header-info p  { font-size: 12px; color: var(--muted); margin-top: 1px; }

    .online-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: #22c55e; font-weight: 500;
    }
    .online-badge::before {
      content: ''; width: 7px; height: 7px;
      background: #22c55e; border-radius: 50%;
    }

    /* ── CHAT ── */
    #chat {
      flex: 1; overflow-y: auto;
      padding: 20px 16px;
      display: flex; flex-direction: column; gap: 14px;
      background: var(--white);
    }

    .msg {
      display: flex; gap: 8px;
      max-width: 80%;
      animation: fadeUp .2s ease;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
    }

    .msg.bot  .bubble {
      background: var(--gray);
      color: var(--dark);
      border-top-left-radius: 4px;
    }

    .msg.user .bubble {
      background: var(--red);
      color: var(--white);
      border-top-right-radius: 4px;
    }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; margin-top: 2px;
      background: linear-gradient(135deg, var(--red), var(--yellow));
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: var(--white);
    }

    /* typing */
    .typing-dots { display:flex; gap:5px; padding: 12px 16px; }
    .typing-dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #ccc; animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2){animation-delay:.2s}
    .typing-dots span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}

    /* ── QUICK REPLIES ── */
    .quick-wrap {
      padding: 0 16px 10px;
      display: flex; flex-wrap: wrap; gap: 8px;
    }

    .quick-btn {
      border: 1.5px solid var(--border);
      background: var(--white); color: var(--dark);
      border-radius: 20px; padding: 7px 15px;
      font-size: 13px; cursor: pointer;
      transition: all .15s;
    }
    .quick-btn:hover {
      border-color: var(--red); color: var(--red);
      background: rgba(250,36,88,.05);
    }
    .opt-list {
      display: flex; flex-direction: column;
      gap: 8px; margin-top: 12px;
    }
    .opt-btn {
      text-align: left;
      border: 1.5px solid var(--border);
      background: var(--white); color: var(--dark);
      border-radius: 12px; padding: 9px 13px;
      font-size: 13px; line-height: 1.35; cursor: pointer;
      transition: all .15s;
    }
    .opt-btn:hover {
      border-color: var(--red); color: var(--red);
      background: rgba(250,36,88,.05);
    }

    /* ── INPUT ── */
    form {
      display: flex; gap: 8px; padding: 12px 16px;
      background: var(--white); border-top: 1px solid var(--border);
    }

    #input {
      flex: 1; border: 1.5px solid var(--border); border-radius: 24px;
      padding: 10px 16px; font-size: 14px; outline: none;
      resize: none; max-height: 120px; line-height: 1.4;
      font-family: inherit; transition: border-color .2s;
    }
    #input:focus { border-color: var(--red); }

    #send-btn {
      background: var(--red); color: var(--white); border: none;
      border-radius: 50%; width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; align-self: flex-end;
      transition: opacity .15s;
    }
    #send-btn:hover    { opacity: .85; }
    #send-btn:disabled { background: #ccc; cursor: not-allowed; }
    #send-btn svg { width: 17px; height: 17px; }

    /* ── USER CHIP (canto) ── */
    .user-chip {
      position: absolute; top: 12px; right: 16px;
      font-size: 12px; color: var(--muted);
    }

    header { position: relative; }
  </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── (lista de colaboradores agora vive no Supabase, protegida por RLS) ──

// ── SUPABASE ──────────────────────────────────────────────────────────────
let sb = null;
const supabaseReady = fetch('/api/config')
  .then(r => r.json())
  .then(cfg => { sb = window.supabase.createClient(cfg.url, cfg.anonKey); });

// Mesmo formato de e-mail usado no script de criação de usuários.
function matriculaToEmail(m) {
  return m.toUpperCase().replace(/[^A-Z0-9]/g, '').toLowerCase() + '@sucre-faq.interno';
}

// ── BUSCA NO FAQ (sem IA / sem token) ─────────────────────────────────────
let FAQ = [];
const CONTATO_DP = 'https://wa.me/5585997153774';

const STOPWORDS = new Set('a o as os um uma de da do das dos e ou que como para por com no na nos nas em ao aos meu minha eu se qual quais quando onde posso fazer faco sobre mais ser estou esta isso ja pra nao sim tem ter tenho preciso quero gostaria vou'.split(/\s+/));

// Apelidos/siglas → palavras da base, para melhorar o reconhecimento.
const SINONIMOS = {
  vt: ['vale','transporte'], va: ['vale','alimentacao'], vr: ['vale','refeicao'],
  data: ['dia'],
  holerite: ['contracheque'], demonstrativo: ['contracheque'],
  aso: ['exame','ocupacional'], inss: ['afastamento','inss','beneficio'],
  pgto: ['pagamento'], salario: ['salario','pagamento'],
  convenio: ['plano','saude'], sindicato: ['contribuicao','sindical'],
  maternidade: ['licenca','maternidade'], paternidade: ['licenca','paternidade'],
  casamento: ['licenca','casamento'], falecimento: ['licenca','falecimento'], obito: ['licenca','falecimento']
};

function normalizar(texto) {
  return texto.toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '')   // remove acentos
    .replace(/[^a-z0-9\s]/g, ' ')
    .split(/\s+/).filter(Boolean);
}

function tokens(texto) {
  const out = [];
  for (const t of normalizar(texto)) {
    if (SINONIMOS[t]) out.push(...SINONIMOS[t]);
    if (t.length >= 2 && !STOPWORDS.has(t)) out.push(t);
  }
  return out;
}

// Carrega as perguntas/respostas uma vez e pré-calcula os tokens de cada uma.
const faqReady = fetch('/api/faq')
  .then(r => r.json())
  .then(d => {
    FAQ = d.pares.map(p => ({
      ...p,
      tokensPergunta: new Set(tokens(p.pergunta)),
      tokensCategoria: new Set(tokens(p.categoria || '')),
      tokensResposta: new Set(tokens(p.resposta))
    }));
  })
  .catch(() => { FAQ = []; });

function ehSaudacao(texto) {
  const t = normalizar(texto).join(' ');
  return /^(oi|ola|opa|bom dia|boa tarde|boa noite|tudo bem|ei)\b/.test(t) && t.length < 20;
}

// Agradecimentos / encerramentos ("obrigada", "entendi", "valeu", "ok").
const AGRADECIMENTOS = new Set(('obrigado obrigada obg obgada vlw valeu agradecido agradecida ' +
  'entendi entendido entendeu compreendi show perfeito beleza blz otimo otima ' +
  'ok okay okey tranquilo tranquila isso era nada mais bom demais massa top ' +
  'muito mto mesmo tudo entao certo claro legal joia ta aew').split(/\s+/));

function ehEncerramento(texto) {
  const palavras = normalizar(texto);
  if (!palavras.length || palavras.length > 6) return false;
  // Só é encerramento se pelo menos uma palavra for de agradecimento e
  // nenhuma palavra restante tiver conteúdo real (fora stopwords/agradecimentos).
  let temAgradecimento = false, temConteudo = false;
  for (const p of palavras) {
    if (AGRADECIMENTOS.has(p)) temAgradecimento = true;
    else if (!STOPWORDS.has(p)) temConteudo = true;
  }
  return temAgradecimento && !temConteudo;
}

function semResposta() {
  return 'Não encontrei essa informação na minha base de conhecimento. Tente reformular a pergunta com outras palavras, ou fale diretamente com o Departamento Pessoal: ' + CONTATO_DP;
}

// Encontra a resposta mais parecida com a pergunta do colaborador.
// Retorna { texto, categoria, encontrou, tipo }.
function responder(pergunta) {
  if (ehSaudacao(pergunta)) {
    return { tipo: 'saudacao', encontrou: true, categoria: null,
      texto: 'Oi! 😊 Como posso te ajudar? Você pode perguntar sobre salário, vale transporte, vale alimentação, ponto, férias, licenças, plano de saúde e muito mais — é só escolher um atalho ou escrever sua dúvida.' };
  }

  if (ehEncerramento(pergunta)) {
    return { tipo: 'encerramento', encontrou: true, categoria: null,
      texto: 'Imagina, fico feliz em ajudar! 😊 Se precisar de mais alguma coisa, é só chamar. Tenha um ótimo dia!' };
  }

  const q = [...new Set(tokens(pergunta))];
  if (!q.length || !FAQ.length) return { tipo: 'faq', encontrou: false, categoria: null, texto: semResposta() };

  const candidatos = [];
  for (const item of FAQ) {
    let acertosP = 0, acertosC = 0, acertosR = 0;
    for (const t of q) {
      if (item.tokensPergunta.has(t)) acertosP++;        // pergunta: peso cheio
      else if (item.tokensCategoria.has(t)) acertosC++;  // categoria: peso médio
      else if (item.tokensResposta.has(t)) acertosR++;   // resposta: peso menor
    }
    if (acertosP + acertosC + acertosR === 0) continue;
    // Cobertura: o quanto da pergunta do FAQ foi coberta pela dúvida.
    // Penaliza perguntas muito específicas (ex.: 13º salário) quando a
    // dúvida não menciona os termos específicos delas.
    const coberturaP = acertosP / Math.max(1, item.tokensPergunta.size);
    const forca = acertosP + acertosC * 0.6 + acertosR * 0.5 + coberturaP * 0.8
                + (acertosP + acertosC + acertosR) / q.length * 0.1;
    candidatos.push({ item, acertosP, forca });
  }
  candidatos.sort((a, b) => b.forca - a.forca);

  const melhor = candidatos[0] || null;
  const melhorForca = melhor ? melhor.forca : 0;
  const melhorAcertosP = melhor ? melhor.acertosP : 0;

  // Dúvida genérica (só o tema, ex.: "e as férias?"): quando a consulta é
  // curta e há vários itens empatados batendo na pergunta, oferece as
  // opções em vez de chutar uma resposta específica.
  if (q.length <= 2) {
    const empatados = candidatos.filter(c => c.acertosP >= 1);
    const dominante = empatados.length >= 2 && (empatados[0].forca - empatados[1].forca) >= 1;
    if (empatados.length >= 2 && !dominante) {
      return {
        tipo: 'opcoes', encontrou: true, categoria: empatados[0].item.categoria,
        texto: 'Sobre esse assunto, posso te ajudar com uma destas dúvidas. Toque na que você quer saber:',
        opcoes: empatados.slice(0, 6).map(c => c.item.pergunta)
      };
    }
  }

  // Aceita quando há força suficiente, ou quando bate a pergunta numa consulta curta.
  const bomMatch = melhorForca >= 2 || (melhorAcertosP >= 1 && q.length <= 2);
  if (melhor && bomMatch) {
    return { tipo: 'faq', encontrou: true, categoria: melhor.item.categoria, texto: melhor.item.resposta };
  }
  return { tipo: 'faq', encontrou: false, categoria: null, texto: semResposta() };
}

// Registra o atendimento no Supabase (não bloqueia a resposta ao usuário).
async function registrarAtendimento(pergunta, r) {
  if (r.tipo !== 'faq' || !sb) return;
  try {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;
    await sb.from('atendimentos').insert({
      user_id: user.id,
      matricula: currentUser?.matricula || null,
      pergunta,
      categoria: r.categoria,
      encontrou: r.encontrou
    });
  } catch (_) { /* silencioso: registro não deve atrapalhar o chat */ }
}

// ── SISTEMA PROMPT gerenciado pelo backend (api/chat.js) ─────────────────


// ── ESTADO ───────────────────────────────────────────────────────────────
const chat       = document.getElementById('chat');
const form       = document.getElementById('form');
const inputEl    = document.getElementById('input');
const sendBtn    = document.getElementById('send-btn');
const quickWrap  = document.getElementById('quick-wrap');

let history      = [];
let currentUser  = null;

// ── LOGIN POR MATRÍCULA + SENHA (Supabase Auth) ───────────────────────────
async function doLogin() {
  const raw   = document.getElementById('matricula-input').value.trim();
  const senha = document.getElementById('senha-input').value;
  const errEl = document.getElementById('login-error');
  const inpEl = document.getElementById('matricula-input');
  const btn   = document.querySelector('#login-screen .login-btn');
  errEl.textContent = '';

  if (!raw || !senha) {
    errEl.textContent = 'Informe matrícula e senha.';
    inpEl.classList.add('error');
    setTimeout(() => inpEl.classList.remove('error'), 600);
    return;
  }

  btn.disabled = true; btn.textContent = 'Entrando...';
  try {
    await supabaseReady;
    const { data, error } = await sb.auth.signInWithPassword({
      email: matriculaToEmail(raw), password: senha
    });

    if (error) {
      errEl.textContent = 'Matrícula ou senha incorreta.';
      inpEl.classList.add('error');
      setTimeout(() => inpEl.classList.remove('error'), 600);
      return;
    }

    if (data.user.user_metadata?.must_change_password) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('change-screen').style.display = 'flex';
      return;
    }

    entrarNoChat(data.user);
  } catch {
    errEl.textContent = 'Não foi possível conectar. Tente novamente.';
  } finally {
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}

// Troca de senha no primeiro acesso.
async function doChangePassword() {
  const p1  = document.getElementById('new-pass').value;
  const p2  = document.getElementById('new-pass2').value;
  const err = document.getElementById('change-error');
  err.textContent = '';

  if (p1.length < 6) { err.textContent = 'A senha deve ter pelo menos 6 caracteres.'; return; }
  if (p1 !== p2)     { err.textContent = 'As senhas não coincidem.'; return; }

  const { data, error } = await sb.auth.updateUser({
    password: p1, data: { must_change_password: false }
  });
  if (error) { err.textContent = 'Não foi possível salvar. Tente novamente.'; return; }

  document.getElementById('change-screen').style.display = 'none';
  entrarNoChat(data.user);
}

function entrarNoChat(user) {
  const nome      = user.user_metadata?.nome || 'Colaborador';
  const matricula = user.user_metadata?.matricula || '';
  currentUser = { matricula, nome };

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('header-sub').textContent = `Assistente de RH · Matrícula ${matricula}`;
  sendBtn.disabled = false;

  const primeiroNome = nome.split(' ')[0];
  const primeiroNomeCap = primeiroNome.charAt(0) + primeiroNome.slice(1).toLowerCase();

  addBotMsg(`Olá, ${primeiroNomeCap}! 😊\n\nSou a Ana, sua assistente de RH da Sucré. Estou aqui para ajudar com dúvidas sobre benefícios, ponto, férias, licenças e pagamentos.\n\nComo posso te ajudar hoje?`);
}

// ── MENSAGENS ─────────────────────────────────────────────────────────────
function addBotMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `<div class="msg-avatar">A</div><div class="bubble">${esc(text)}</div>`;
  chat.appendChild(div);
  scroll();
}

// Mensagem da Ana com opções clicáveis (desambiguação de temas genéricos).
function addBotOptions(text, opcoes) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  const botoes = opcoes.map(op =>
    `<button type="button" class="opt-btn" data-q="${esc(op)}">${esc(op)}</button>`
  ).join('');
  div.innerHTML = `<div class="msg-avatar">A</div><div class="bubble">${esc(text)}<div class="opt-list">${botoes}</div></div>`;
  div.querySelectorAll('.opt-btn').forEach(b =>
    b.addEventListener('click', () => sendMessage(b.dataset.q))
  );
  chat.appendChild(div);
  scroll();
}

function addUserMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="bubble">${esc(text)}</div>`;
  chat.appendChild(div);
  scroll();
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">A</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(div); scroll();
}
function removeTyping() { document.getElementById('typing')?.remove(); }

function scroll() { chat.scrollTop = chat.scrollHeight; }

function esc(t) {
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>')
    .replace(/(https?:\/\/[^\s<&]+)/g, (url) => {
      const isDP = url.includes('wa.me/5585997153774');
      const label = isDP ? 'Clique aqui para falar com o Departamento Pessoal' : url;
      return `<a href="${url}" target="_blank" style="color:var(--red);word-break:break-all;">${label}</a>`;
    });
}

// ── ENVIO ─────────────────────────────────────────────────────────────────
async function sendMessage(text) {
  if (!text.trim() || !currentUser) return;

  quickWrap.style.display = 'none';
  addUserMsg(text);

  inputEl.value = ''; inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  showTyping();

  await faqReady;                 // garante que a base já carregou
  const r = responder(text);
  registrarAtendimento(text, r);  // registro em segundo plano

  // Pequeno atraso só para dar naturalidade ao "digitando…".
  setTimeout(() => {
    removeTyping();
    if (r.tipo === 'opcoes') addBotOptions(r.texto, r.opcoes);
    else addBotMsg(r.texto);
    sendBtn.disabled = false;
    inputEl.focus();
  }, 350);
}

function sendQuick(t) { sendMessage(t); }

form.addEventListener('submit', e => { e.preventDefault(); sendMessage(inputEl.value); });

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(inputEl.value); }
});

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});
</script>
